name: Process Bot Commands

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: otodom-bot
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process commands
        run: python -m src.commands
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit changes
        if: always()
        run: |
          git config user.name "otodom-bot"
          git config user.email "bot@users.noreply.github.com"
          git add config.yml state/seen.json state/bot_state.json
          git diff --staged --quiet || git commit -m "chore: bot command updates [skip ci]"
          git push
